name: ddev-ssh-agent

volumes:
  dot_ssh:
    name: "ddev-ssh-agent_dot_ssh"
  socket_dir:
    name: "ddev-ssh-agent_socket_dir"

services:
  ddev-ssh-agent:
    {{ if .IsPodmanRootless .IsLinux }}
    userns_mode: keep-id
    {{ end }}
    container_name: ddev-ssh-agent
    hostname: ddev-ssh-agent
    image: '{{ .SSHAuthImage }}'
    networks:
      - ddev_default
    restart: "no"
    user: '{{ .UID }}:{{ .GID }}'
    volumes:
      - "dot_ssh:/tmp/.ssh"
      - "socket_dir:/tmp/.ssh-agent"
    environment:
      - SSH_AUTH_SOCK=/tmp/.ssh-agent/socket
      - TZ={{ .Timezone }}
    healthcheck:
      test: "/healthcheck.sh"
      interval: 1s
      retries: 2
      start_period: 10s
      {{- if templateCanUse "healthcheck.start_interval" }}
      start_interval: "500ms"
      {{- end }}
      timeout: 62s
networks:
  ddev_default:
    name: ddev_default
    external: true
