name: ${COMPOSE_PROJECT_NAME}
  {{ .DdevGenerated }}
services:
  {{ if not .OmitDB }}
  db:
    container_name: ddev-${DDEV_SITENAME}-db
    build:
      context: '{{ .DBBuildContext }}'
      args:
        BASE_IMAGE: $DDEV_DBIMAGE
        username: '{{ .Username }}'
        uid: '{{ .UID }}'
        gid: '{{ .GID }}'
    image: ${DDEV_DBIMAGE}-${DDEV_SITENAME}-built
    cap_add:
      - SYS_NICE
    stop_grace_period: 60s
    working_dir: "{{ .DBWorkingDir }}"
    volumes:
      - type: "volume"
        source: "database"
        target: "{{ .DBMountDir }}"
        volume:
          nocopy: true
      {{ if .NoBindMounts }}
      - ddev-config:/mnt/ddev_config
      - snapshots:/mnt/snapshots
      {{ else }} {{/* if (not) .NoBindMounts */}}
      # On db container ddev_config is mounted rw so we can create snapshots
      - .:/mnt/ddev_config
      - ./db_snapshots:/mnt/snapshots
      {{ end }} {{/* end if .NoBindMounts */}}
      - ddev-global-cache:/mnt/ddev-global-cache
    restart: "no"

    user: '$DDEV_UID:$DDEV_GID'
    hostname: {{ .Name }}-db
    ports:
      - "{{ .DockerIP }}:$DDEV_HOST_DB_PORT:{{ .DBPort }}"
    environment:
      - COLUMNS
      - DDEV_DATABASE
      - DDEV_DATABASE_FAMILY
      - DDEV_GID
      - DDEV_GOARCH
      - DDEV_GOOS
      - DDEV_HOSTNAME
      - DDEV_PHP_VERSION
      - DDEV_PRIMARY_URL
      - DDEV_PRIMARY_URL_PORT
      - DDEV_PRIMARY_URL_WITHOUT_PORT
      - DDEV_PROJECT
      - DDEV_PROJECT_TYPE
      - DDEV_ROUTER_HTTP_PORT
      - DDEV_ROUTER_HTTPS_PORT
      - DDEV_SCHEME
      - DDEV_SITENAME
      - DDEV_TLD
      - DDEV_UID
      - DDEV_USER
      - DDEV_VERSION
      - DOCKER_IP={{ .DockerIP }}
      - IS_DDEV_PROJECT=true
      - LINES
      - MYSQL_HISTFILE=/mnt/ddev-global-cache/mysqlhistory/${DDEV_SITENAME}-db/mysql_history
      - PGDATABASE=db
      - PGHOST=127.0.0.1
      - PGPASSWORD=db
      - PGUSER=db
      - POSTGRES_PASSWORD=db
      - POSTGRES_USER=db
      - POSTGRES_DB=db
      {{- if ne (env "DDEV_PAGER") "" }}
      - PAGER=${DDEV_PAGER}
      {{- end }}
      - TZ={{ .Timezone }}
      - USER={{ .Username }}
    command: ${DDEV_DB_CONTAINER_COMMAND}
    healthcheck:
      test: "/healthcheck.sh"
      interval: "1s"
      retries: 70
      start_period: "{{ .DefaultContainerTimeout }}s"
      {{- if templateCanUse "healthcheck.start_interval" }}
      start_interval: "1s"
      {{- end }}
      timeout: "70s"
  {{ end }} {{/* end if not .OmitDB */}}

  web:
    container_name: ddev-${DDEV_SITENAME}-web
    build:
      context: '{{ .WebBuildContext }}'
      args:
        BASE_IMAGE: $DDEV_WEBIMAGE
        username: '{{ .Username }}'
        uid: '{{ .UID }}'
        gid: '{{ .GID }}'
        DDEV_PHP_VERSION: ${DDEV_PHP_VERSION}
        DDEV_DATABASE: ${DDEV_DATABASE}
    image: ${DDEV_WEBIMAGE}-${DDEV_SITENAME}-built
    command: /pre-start.sh

    networks: ["default", "ddev_default"]
    cap_add:
      - SYS_PTRACE
    working_dir: "{{ .WebWorkingDir }}"

    {{ .WebExtraExposedPorts }}

    volumes:
      {{ if and (not .MutagenEnabled) (not .NoProjectMount) }}
      - type: {{ .MountType }}
        source: {{ .WebMount }}
        target: /var/www/html
        {{ if eq .MountType "volume" }}
        volume:
          nocopy: true
        {{ else }} {{/* if eq .MountType "volume"*/}}
        consistency: cached
        {{ end }} {{/* end if eq .MountType "volume" */}}
      {{ end }} {{/* end if and (not .MutagenEnabled) (not .NoProjectMount)*/}}
      {{ if and .MutagenEnabled (not .NoProjectMount) }}
      # For mutagen, mount a directory higher in /var/www so that we can use
      # stageMode: "neighboring"
      - type: volume
        source: project_mutagen
        target: /var/www
        volume:
          nocopy: true
      # This second mutagen mount is only to make just the volume available so it can be chowned
      # without accidentally also hitting docker mounts
      - type: volume
        source: project_mutagen
        target: /tmp/project_mutagen
        volume:
          nocopy: true
      {{- end }}

      {{- if .NoBindMounts }}
      - ddev-config:/mnt/ddev_config
      {{- else }}
      - .:/mnt/ddev_config:ro
      {{- if eq .XHProfMode "prepend" }}
      - ./xhprof:/usr/local/bin/xhprof:rw
      {{ end }}
        {{- if .MutagenEnabled }}
          {{- range $uploadDirMap := .UploadDirsMap}}
      - {{ $uploadDirMap }}:rw
          {{- end}} {{- /* end range .UploadDirsMap */}}
          {{- if .GitDirMount }}
      - ../.git:/var/www/html/.git:rw
          {{- end }} {{- /* end if .GitDirMount */}}
        {{- end }} {{- /* end if .MutagenEnabled */}}
      {{- end }} {{- /* end else of if .NoBindMounts */}}
      - ddev-global-cache:/mnt/ddev-global-cache
      {{- if not .OmitSSHAgent }}
      - ddev-ssh-agent_socket_dir:/home/.ssh-agent
      {{- end }}

    restart: "no"
    user: '$DDEV_UID:$DDEV_GID'
    # Group 0 (root) is added here because Docker does not derive supplementary
    # groups from /etc/group when both uid and gid are given explicitly (as
    # above); it must be requested with group_add. This lets the container user
    # read/write directories baked group-writable-by-root in the image (e.g.
    # /usr/local/n, see containers/ddev-php-base/Dockerfile and the useradd
    # command in WriteBuildDockerfile), instead of DDEV chgrp/chmod'ing them
    # for every project. See
    # https://developers.redhat.com/blog/2020/10/26/adapting-docker-and-kubernetes-containers-to-run-on-red-hat-openshift-container-platform
    group_add:
      - "0"
    hostname: {{ .Name }}-web

    ports:
    {{- if ne .WebserverType "generic" }}
      - "{{ $.DockerIP }}:$DDEV_HOST_HTTP_PORT:80"
      - "{{ $.DockerIP }}:$DDEV_HOST_HTTPS_PORT:443"
    {{- end }}
    {{- range .WebExtraContainerPorts }}
      - "{{ $.DockerIP }}::{{ . }}"
    {{- end }}
    {{- if .MailpitPort }}
      - "{{ $.DockerIP }}:{{ .HostMailpitPort }}:{{ .MailpitPort }}"
    {{- end }}

    environment:
    - COLUMNS
    - COREPACK_ENABLE_DOWNLOAD_PROMPT=0
    - COREPACK_HOME=/mnt/ddev-global-cache/corepack
    - DOCROOT=${DDEV_DOCROOT}
    - DDEV_APPROOT=/var/www/html
    - DDEV_COMPOSER_ROOT
    - DDEV_DATABASE
    - DDEV_DOCROOT
    - DDEV_DATABASE_FAMILY
    - DDEV_GID
    - DDEV_GOARCH
    - DDEV_GOOS
    - DDEV_HOSTNAME
    - DDEV_MUTAGEN_ENABLED
    - DDEV_PHP_VERSION
    - DDEV_PRIMARY_URL
    - DDEV_PRIMARY_URL_PORT
    - DDEV_PRIMARY_URL_WITHOUT_PORT
    - DDEV_PROJECT
    - DDEV_PROJECT_TYPE
    - DDEV_ROUTER_HTTP_PORT
    - DDEV_ROUTER_HTTPS_PORT
    - DDEV_SCHEME
    - DDEV_SITENAME
    - DDEV_TLD
    - DDEV_UID
    - DDEV_USER
    - DDEV_FILES_DIR
    - DDEV_FILES_DIRS
    - DDEV_WEB_ENTRYPOINT=/mnt/ddev_config/web-entrypoint.d
    - DDEV_WEBSERVER_TYPE
    - DDEV_XDEBUG_ENABLED
    - DDEV_XHPROF_MODE
    - DDEV_VERSION
    - DEPLOY_NAME=local
    {{ if not .DisableSettingsManagement }}
    - DRUSH_OPTIONS_URI=$DDEV_PRIMARY_URL
    {{ end }}
    - DOCKER_IP={{ .DockerIP }}
    # HTTP_EXPOSE allows for ports accepting HTTP traffic to be accessible from <site>.ddev.site:<port>
    # To expose a container port to a different host port, define the port as hostPort:containerPort
    # You can optionally expose an HTTPS port option for any ports defined in HTTP_EXPOSE.
    # To expose an HTTPS port, define the port as securePort:containerPort.
    {{ if eq .WebserverType "generic" }}
    - HTTP_EXPOSE=${DDEV_MAILPIT_PORT}:{{ .MailpitPort }}{{ .WebExtraHTTPPorts }}
    - HTTPS_EXPOSE=${DDEV_MAILPIT_HTTPS_PORT}:{{ .MailpitPort }}{{ .WebExtraHTTPSPorts }}
    {{ else }}
    - HTTP_EXPOSE=${DDEV_ROUTER_HTTP_PORT}:80,${DDEV_MAILPIT_PORT}:{{ .MailpitPort }}{{ .WebExtraHTTPPorts }}
    - HTTPS_EXPOSE=${DDEV_ROUTER_HTTPS_PORT}:80,${DDEV_MAILPIT_HTTPS_PORT}:{{ .MailpitPort }}{{ .WebExtraHTTPSPorts }}
    {{ end }}
    - IS_DDEV_PROJECT=true
    - LINES
    - MYSQL_HISTFILE=/mnt/ddev-global-cache/mysqlhistory/${DDEV_SITENAME}-web/mysql_history
    - N_PREFIX=/usr/local/n
    - N_CACHE_PREFIX=/mnt/ddev-global-cache/n_prefix/${DDEV_SITENAME}-web
    - NODE_EXTRA_CA_CERTS=/mnt/ddev-global-cache/mkcert/rootCA.pem
    - npm_config_cache=/mnt/ddev-global-cache/npm
    {{- if ne (env "DDEV_PAGER") "" }}
    - PAGER=${DDEV_PAGER}
    {{- end }}
    - PGDATABASE=db
    - PGHOST=db
    - PGPASSWORD=db
    - PGUSER=db
    - PHP_IDE_CONFIG=serverName={{ .Name | lower }}.${DDEV_TLD}
    - SSH_AUTH_SOCK=/home/.ssh-agent/socket
    - TZ={{ .Timezone }}
    - USER={{ .Username }}
    - VIRTUAL_HOST=${DDEV_HOSTNAME}
    {{ range $env := .WebEnvironment }}- "{{ $env }}"
    {{ end }}

    healthcheck:
      test: "/healthcheck.sh"
      interval: "1s"
      retries: 70
      start_period: "{{ .DefaultContainerTimeout }}s"
      {{- if templateCanUse "healthcheck.start_interval" }}
      start_interval: "1s"
      {{- end }}
      timeout: "70s"
  {{ if (not .OmitDB) }}
  xhgui:
    image: {{ .XhguiImage }}
    container_name: ddev-${DDEV_SITENAME}-xhgui
    profiles:
      - xhgui
    restart: "no"
    {{ if .HostXHGuiPort }}
    ports:
      - "{{ $.DockerIP }}:{{ .HostXHGuiPort }}:{{ .XHGuiPort }}"
    {{- end }}

    environment:
      - VIRTUAL_HOST=$DDEV_HOSTNAME
      - HTTP_EXPOSE={{ .XHGuiHTTPPort }}:{{ .XHGuiPort }}
      - HTTPS_EXPOSE={{ .XHGuiHTTPSPort }}:{{ .XHGuiPort }}
      - XHGUI_SAVE_HANDLER=pdo
      - DDEV_DATABASE_FAMILY=${DDEV_DATABASE_FAMILY}
      - XHGUI_PDO_USER=db
      - XHGUI_PDO_PASS=db
      - TZ={{ .Timezone }}
    depends_on:
      - db
    healthcheck:
      test: "/healthcheck.sh"
      interval: "1s"
      retries: 70
      start_period: "{{ .DefaultContainerTimeout }}s"
      {{- if templateCanUse "healthcheck.start_interval" }}
      start_interval: "1s"
      {{- end }}
      timeout: "70s"
    x-ddev:
      describe-url-port: "Launch: ddev xhgui"
  {{- end }}
networks:
  ddev_default:
    name: ddev_default
    external: true
  default:
    name: ${COMPOSE_PROJECT_NAME}_default

volumes:
  {{ if not .OmitDB }}
  database:
    name: "{{ if eq .DBType "postgres" }}{{ .PostgresVolumeName }}{{ else }}{{ .MariaDBVolumeName }}{{ end }}"
    external: true
  {{ end }} {{/* end if not .OmitDB */}}

  {{ if not .OmitSSHAgent }}
  ddev-ssh-agent_socket_dir:
    external: true
  {{ end }}{{/* end if not .OmitSSHAgent */}}
  ddev-global-cache:
    name: ddev-global-cache
    external: true
  {{ if .NoBindMounts }}
  ddev-config:
    name: ${DDEV_SITENAME}-ddev-config
    external: true
  snapshots:
    name: ddev-${DDEV_SITENAME}-snapshots
    external: true
  {{ end }}{{/* end if .NoBindMounts */}}
  {{ if and .MutagenEnabled (not .NoProjectMount) }}
  project_mutagen:
    name: {{ .MutagenVolumeName }}
    external: true

  {{ end }}{{/* end if and .MutagenEnabled (not .NoProjectMount) */}}
