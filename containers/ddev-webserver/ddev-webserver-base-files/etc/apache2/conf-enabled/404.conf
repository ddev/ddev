# Explain webserver-layer 404s (missing file or wrong docroot) instead of
# returning a bare, unhelpful 404.
#
# Set at server-config (global) scope, outside any VirtualHost, so it's
# inherited by every VirtualHost that doesn't set its own ErrorDocument 404 --
# the container's own default site and every ddev-generated per-project-type
# site under sites-enabled -- without needing to duplicate it in each one.
#
# This only fires for 404s that Apache generates itself (e.g. a request for a
# static file that doesn't exist under DocumentRoot), never for 404s produced
# by the project's own application/CMS code. That's because `ProxyErrorOverride`
# is not enabled (it defaults to Off), so once a request is proxied to
# php-fpm (see the php*-fpm.conf snippets in conf-enabled, which SetHandler
# proxy:fcgi for *.php/.phar/.phtml requests) and php-fpm/the app sends back
# a response with a body -- including a framework's own "page not found"
# route, or php-fpm's "No input file specified" for a missing script --
# Apache passes that response through unchanged and ErrorDocument is never
# invoked for it.
Alias /ddev-webserver-404-error /var/www/ddev-webserver-404-error.txt
<Location /ddev-webserver-404-error>
    ForceType text/plain
    Header always set X-DDEV-404-Source "ddev-webserver (apache)"
</Location>
ErrorDocument 404 /ddev-webserver-404-error
