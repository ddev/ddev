# Explain webserver-layer 404s (missing file or wrong docroot) instead of
# returning a bare, unhelpful 404.
#
# Set at server-config (global) scope, outside any VirtualHost, so it's
# inherited by every VirtualHost that doesn't set its own ErrorDocument 404 --
# the container's own default site and every ddev-generated per-project-type
# site under sites-enabled -- without needing to duplicate it in each one.
#
# This only fires for 404s that Apache generates itself -- a request for a
# static file that doesn't exist under DocumentRoot, or a directly requested
# *.php/.phar/.phtml file that doesn't exist on disk (the php*-fpm.conf
# snippets in conf-available guard their SetHandler proxy:fcgi with
# `-f %{REQUEST_FILENAME}`, so a missing script never reaches php-fpm) --
# never for 404s produced by the project's own application/CMS code. That's
# because `ProxyErrorOverride` is not enabled (it defaults to Off), so once a
# request is proxied to php-fpm and php-fpm/the app sends back a response
# with a body -- e.g. a framework's own "page not found" route -- Apache
# passes that response through unchanged and ErrorDocument is never invoked
# for it.
#
# The static file lives under /usr/local/share, not /var/www: DDEV's Mutagen
# and no-bind-mounts modes mount a Docker volume at /var/www (as a sibling of
# /var/www/html, for Mutagen's "neighboring" stage mode) with `nocopy: true`,
# which shadows anything baked into the image there -- including this file if
# it lived under /var/www.
Alias /ddev-webserver-404-error /usr/local/share/ddev-webserver-404-error.txt
<Directory /usr/local/share>
    Require all granted
</Directory>
<Location /ddev-webserver-404-error>
    ForceType text/plain
    Header always set X-Ddev-404-Source "ddev-webserver (apache)"
</Location>
ErrorDocument 404 /ddev-webserver-404-error
