# ddev generic/default/php config for apache2

<VirtualHost *:80>
    # Workaround from https://mail-archives.apache.org/mod_mbox/httpd-users/201403.mbox/%3C49404A24C7FAD94BB7B45E86A9305F6214D04652@MSGEXSV21103.ent.wfb.bank.corp%3E
    # See also https://gist.github.com/nurtext/b6ac07ac7d8c372bc8eb

    RewriteEngine On
    RewriteCond %{HTTP:X-Forwarded-Proto} =https
    RewriteCond    %{DOCUMENT_ROOT}%{REQUEST_FILENAME} -d
    RewriteRule    ^(.+[^/])$           https://%{HTTP_HOST}$1/ [redirect,last]

    SetEnvIf X-Forwarded-Proto "https" HTTPS=on

    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html
    <Directory "/var/www/html/">
      AllowOverride All
      Allow from All
    </Directory>

    # Available loglevels: trace8, ..., trace1, debug, info, notice, warn,
    # error, crit, alert, emerg.
    # It is also possible to configure the loglevel for particular
    # modules, e.g.
    #LogLevel info ssl:warn

    ErrorLog /dev/stdout
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Explain webserver-layer 404s (missing file or wrong docroot) instead of
    # returning a bare, unhelpful 404.
    #
    # This only fires for 404s that Apache generates itself (e.g. a request
    # for a static file that doesn't exist under DocumentRoot), never for
    # 404s produced by the project's own application/CMS code. That's
    # because `ProxyErrorOverride` is not enabled here (it defaults to Off),
    # so once a request is proxied to php-fpm (see the php*-fpm.conf
    # snippets in conf-enabled, which SetHandler proxy:fcgi for *.php/.phar/
    # .phtml requests) and php-fpm/the app sends back a response with a
    # body -- including a framework's own "page not found" route, or
    # php-fpm's "No input file specified" for a missing script -- Apache
    # passes that response through unchanged and ErrorDocument is never
    # invoked for it.
    ErrorDocument 404 "404 Not Found - This 404 was generated by the ddev-webserver container (Apache), not by your project's application or CMS code. This usually means the requested file does not exist, or the 'docroot' setting in your project's .ddev/config.yaml does not point to the right directory. Check that docroot in .ddev/config.yaml matches where your project's index.php actually lives, confirm the requested file exists, and run 'ddev logs' to check for php-fpm errors."

    # For most configuration files from conf-available/, which are
    # enabled or disabled at a global level, it is possible to
    # include a line for only one particular virtual host. For example the
    # following line enables the CGI configuration for this host only
    # after it has been globally disabled with "a2disconf".
    #Include conf-available/serve-cgi-bin.conf
    # Simple ddev technique to get a phpstatus
    Alias "/phpstatus" "/var/www/phpstatus.php"
    Alias "/xhprof" "/var/xhprof/xhprof_html"
    <Directory "/var/xhprof">
        Options Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Double the default LimitRequestFieldSize for large header payloads
    LimitRequestFieldSize 16380

</VirtualHost>

<VirtualHost *:443>
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/master.crt
    SSLCertificateKeyFile /etc/ssl/certs/master.key

    # Workaround from https://mail-archives.apache.org/mod_mbox/httpd-users/201403.mbox/%3C49404A24C7FAD94BB7B45E86A9305F6214D04652@MSGEXSV21103.ent.wfb.bank.corp%3E
    # See also https://gist.github.com/nurtext/b6ac07ac7d8c372bc8eb

    RewriteEngine On
    RewriteCond %{HTTP:X-Forwarded-Proto} =https
    RewriteCond    %{DOCUMENT_ROOT}%{REQUEST_FILENAME} -d
    RewriteRule    ^(.+[^/])$           https://%{HTTP_HOST}$1/ [redirect,last]

    SetEnvIf X-Forwarded-Proto "https" HTTPS=on

    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html
    <Directory "/var/www/html/">
      AllowOverride All
      Allow from All
    </Directory>
    # Available loglevels: trace8, ..., trace1, debug, info, notice, warn,
    # error, crit, alert, emerg.
    # It is also possible to configure the loglevel for particular
    # modules, e.g.
    #LogLevel info ssl:warn

    ErrorLog /dev/stdout
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Explain webserver-layer 404s (missing file or wrong docroot) instead of
    # returning a bare, unhelpful 404. See the matching comment in the *:80
    # VirtualHost above for why this doesn't affect app/CMS-generated 404s.
    ErrorDocument 404 "404 Not Found - This 404 was generated by the ddev-webserver container (Apache), not by your project's application or CMS code. This usually means the requested file does not exist, or the 'docroot' setting in your project's .ddev/config.yaml does not point to the right directory. Check that docroot in .ddev/config.yaml matches where your project's index.php actually lives, confirm the requested file exists, and run 'ddev logs' to check for php-fpm errors."

    # For most configuration files from conf-available/, which are
    # enabled or disabled at a global level, it is possible to
    # include a line for only one particular virtual host. For example the
    # following line enables the CGI configuration for this host only
    # after it has been globally disabled with "a2disconf".
    #Include conf-available/serve-cgi-bin.conf
    # Simple ddev technique to get a phpstatus
    Alias "/phpstatus" "/var/www/phpstatus.php"
    Alias "/xhprof" "/var/xhprof/xhprof_html"
    <Directory "/var/xhprof">
        Options Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Double the default LimitRequestFieldSize for large header payloads
    LimitRequestFieldSize 16380

</VirtualHost>
