# ddev default config

server {
    listen 80 default_server;
    listen 443 ssl default_server;

    root /var/www/html;

    ssl_certificate /etc/ssl/certs/master.crt;
    ssl_certificate_key /etc/ssl/certs/master.key;

    include /etc/nginx/monitoring.conf;


    index index.php index.htm index.html;

    # Disable sendfile as per https://docs.vagrantup.com/v2/synced-folders/virtualbox.html
    sendfile off;
    error_log /dev/stdout info;
    access_log /var/log/nginx/access.log;

    # Explain webserver-layer 404s (missing file, wrong docroot, or a PHP
    # script that doesn't exist) instead of returning a bare, unhelpful 404.
    #
    # This only fires for 404s that nginx generates itself (from the
    # `try_files ... =404` fallbacks below), never for 404s produced by the
    # project's own application/CMS code. That's because:
    #   - `fastcgi_intercept_errors off;` (below) means that once a request
    #     reaches php-fpm and php-fpm/the app sends back a response with a
    #     body (e.g. a framework's own "page not found" route, or php-fpm's
    #     "No input file specified" for a missing script), nginx passes that
    #     response through unchanged and error_page is never invoked for it.
    #   - `error_page` only fires for a status code that nginx itself
    #     produces with no upstream body already attached, which here means:
    #     the `location /` catch-all fails to find $uri and there's no
    #     index.php to fall back to (missing/misconfigured docroot), or a
    #     directly requested *.php file doesn't exist on disk and is rejected
    #     by `try_files $uri =404;` in the php location block below, before
    #     the request ever reaches php-fpm.
    error_page 404 /ddev-webserver-404-error;

    location = /ddev-webserver-404-error {
        internal;
        default_type text/plain;
        return 404 "404 Not Found\n\nThis 404 was generated by the ddev-webserver container (nginx), not by your project's application or CMS code.\n\nThis usually means one of the following:\n  - The requested file does not exist.\n  - The 'docroot' setting in your project's .ddev/config.yaml does not point to the right directory.\n  - php-fpm could not find the PHP script it was asked to run.\n\nThings to check:\n  - Confirm 'docroot' in .ddev/config.yaml matches where your project's index.php actually lives.\n  - Confirm the requested file exists at that path.\n  - Run 'ddev logs' to check for php-fpm errors.\n";
    }

    location / {
        absolute_redirect off;
        try_files $uri /index.php?$query_string;
    }

    location @rewrite {
        # For D7 and above:
        # Clean URLs are handled in drupal_environment_initialize().
        rewrite ^ /index.php;
    }

    # pass the PHP scripts to FastCGI server listening on socket
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_intercept_errors off;
        # fastcgi_read_timeout should match max_execution_time in php.ini
        fastcgi_read_timeout 10m;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param HTTPS $fcgi_https;
    }

    # Expire rules for static content
    # Feed
    location ~* \.(?:rss|atom)$ {
        expires 1h;
    }

    # Media: images, icons, video, audio, HTC
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Prevent clients from accessing hidden files (starting with a dot)
    # This is particularly important if you store .htpasswd files in the site hierarchy
    # Access to `/.well-known/` is allowed.
    # https://www.mnot.net/blog/2010/04/07/well-known
    # https://tools.ietf.org/html/rfc5785
    location ~* /\.(?!well-known\/) {
        deny all;
    }

    # Prevent clients from accessing to backup/config/source files
    location ~* (?:\.(?:bak|conf|dist|fla|in[ci]|log|psd|sh|sql|sw[op])|~)$ {
        deny all;
    }

    include /etc/nginx/common.d/*.conf;
    include /mnt/ddev_config/nginx/*.conf;
}
