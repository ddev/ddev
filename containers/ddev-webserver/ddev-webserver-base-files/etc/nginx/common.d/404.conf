    # Explain webserver-layer 404s (missing file, wrong docroot, or a PHP
    # script that doesn't exist) instead of returning a bare, unhelpful 404.
    #
    # This lives in common.d/ (included by every project-type nginx-site*.conf
    # template as well as the container's own default site) so it applies to
    # every real project, not just the fallback config.
    #
    # This only fires for 404s that nginx generates itself (from the
    # `try_files ... =404` fallbacks in the enclosing site config), never for
    # 404s produced by the project's own application/CMS code. That's because:
    #   - `fastcgi_intercept_errors off;` in the php location block means that
    #     once a request reaches php-fpm and php-fpm/the app sends back a
    #     response with a body (e.g. a framework's own "page not found"
    #     route, or php-fpm's "No input file specified" for a missing
    #     script), nginx passes that response through unchanged and
    #     error_page is never invoked for it.
    #   - `error_page` only fires for a status code that nginx itself
    #     produces with no upstream body already attached, which here means:
    #     the catch-all location fails to find $uri and there's no index.php
    #     to fall back to (missing/misconfigured docroot), or a directly
    #     requested *.php file doesn't exist on disk and is rejected by
    #     `try_files $uri =404;` in the php location block, before the
    #     request ever reaches php-fpm.
    error_page 404 /ddev-webserver-404-error;

    # The static file lives under /usr/local/share, not /var/www: DDEV's
    # Mutagen and no-bind-mounts modes mount a Docker volume at /var/www (as
    # a sibling of /var/www/html, for Mutagen's "neighboring" stage mode)
    # with `nocopy: true`, which shadows anything baked into the image there
    # -- including this file if it lived under /var/www.
    #
    # error_page without an explicit `=` code preserves the original 404
    # status even though the target location serves a static file that
    # would otherwise return 200 on its own.
    location = /ddev-webserver-404-error {
        internal;
        default_type text/html;
        add_header X-Ddev-404-Source "ddev-webserver (nginx)" always;
        alias /usr/local/share/ddev-webserver-404-error.html;
    }
