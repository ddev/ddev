#ddev-generated
services:
  busybox:
    container_name: ddev-${DDEV_SITENAME}-busybox
    build:
      context: busybox
    command: tail -f /dev/null
    restart: "no"
    volumes:
      - ".:/mnt/ddev_config"
      - "ddev-global-cache:/mnt/ddev-global-cache"
      - "busybox:/tmp"

volumes:
  busybox:
    name: third-party-tmp-busybox-volume
