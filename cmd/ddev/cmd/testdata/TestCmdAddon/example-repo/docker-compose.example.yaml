#ddev-generated

services:
  memcached:
    container_name: ddev-${DDEV_SITENAME}-memcached
    image: memcached:1.6
    restart: "no"
    # memcached is available at this port inside the container.
    expose:
      - 11211

    # Arguments passed to the memcached binary.
    command: ["-m", "128"]

    volumes:
    - ".:/mnt/ddev_config"
