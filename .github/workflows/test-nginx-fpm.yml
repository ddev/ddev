name: Test Nginx-FPM
on:
  pull_request:
    paths:
      - "go.*"
      - "pkg/**"
      - "cmd/**"
      - "Makefile"
      - "vendor/**"
      - ".github/workflows/**"
      - "!.github/workflows/docs**"
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run the build with tmate set "debug_enabled"'
        type: boolean
        required: false
        default: false
      testargs:
        description: 'TESTARGS value'
        type: string
        required: false
        default: ''
      gotest_short:
        description: 'GOTEST_SHORT value (16=drupal11 only)'
        type: string
        required: false
        default: '16'
      make_target:
        description: 'Make target to run (custom job only)'
        type: choice
        required: false
        default: 'test'
        options:
          - test
          - testpkg
          - testcmd
          - testddevapp
          - testnotddevapp
          - testfullsitesetup
          - testonepkg
          - testonefile
      makeargs:
        description: 'Extra make arguments: TESTPKG=./pkg/dockerutil (for testonepkg) or TESTFILE=./pkg/ddevapp/ddevapp_test.go (for testonefile)'
        type: string
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nginx-fpm:
    if: github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/test-reusable.yml
    secrets: inherit
    with:
      ddev_test_webserver_type: "nginx-fpm"
      ddev_skip_nodejs_test: "false"
      testargs: ""
      debug_enabled: ${{ inputs.debug_enabled || false }}

  nginx-fpm-custom:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/test-reusable.yml
    secrets: inherit
    with:
      make_target: ${{ inputs.make_target }}
      makeargs: ${{ inputs.makeargs }}
      testargs: ${{ inputs.testargs }}
      gotest_short: ${{ inputs.gotest_short }}
      ddev_test_webserver_type: "nginx-fpm"
      ddev_skip_nodejs_test: "false"
      debug_enabled: ${{ inputs.debug_enabled || false }}
