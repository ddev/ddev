name: Test WSL2 (Docker CE)

on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run the build with tmate set "debug_enabled"'
        type: boolean
        required: false
        default: false
      testargs:
        description: 'TESTARGS value'
        type: string
        required: false
        default: '-failfast'
      gotest_short:
        description: 'GOTEST_SHORT value (16=drupal11 only)'
        type: string
        required: false
        default: '16'
      ddev_embargo_tests:
        description: 'Pipe-separated list of test names to skip (e.g., TestName1|TestName2)'
        type: string
        required: false
        default: ''
      make_target:
        description: 'Make target to run'
        type: string
        required: false
        default: 'test'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOTEST_SHORT: ${{ inputs.gotest_short || '16' }}
  TESTARGS: ${{ inputs.testargs || '-failfast' }}
  MAKE_TARGET: ${{ inputs.make_target || 'test' }}
  DDEV_EMBARGO_TESTS: ${{ inputs.ddev_embargo_tests || vars.DDEV_EMBARGO_TESTS || '' }}
  DDEV_SKIP_NODEJS_TEST: 'true'
  GITHUB_REPOSITORY_URL: "https://github.com/${{ github.repository }}"

jobs:
  test-wsl2:
    runs-on: windows-2025
    timeout-minutes: 120

    steps:
      - name: Install WSL2 distribution
        shell: pwsh
        run: |
          Write-Host "Setting WSL default version to 2"
          wsl --set-default-version 2
          Write-Host "Installing DDEV Ubuntu distro"
          wsl --install --name DDEV --no-launch
          wsl -d DDEV --user root bash -c "useradd -m -s /bin/bash testbot && echo 'testbot:password' | chpasswd && usermod -aG sudo testbot && printf '[user]\ndefault=testbot\n' > /etc/wsl.conf"

          wsl --set-default DDEV

          Write-Host "Verifying WSL installation"
          wsl --list --verbose
          wsl uname -a

      - name: Setup tmate session
        if: ${{ inputs.debug_enabled }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

      - name: Clone repo and run setup inside WSL2
        shell: pwsh
        run: |
          $repoUrl = "${{ env.GITHUB_REPOSITORY_URL }}"
          $branchName = "${{ github.ref_name }}"
          # Shallow clone inside WSL2 as root just to get the setup scripts
          wsl -u root -- bash -exc "git clone --depth=1 --single-branch --branch '$branchName' '$repoUrl' /tmp/ddev-ci && cd /tmp/ddev-ci && bash -e .github/workflows/wsl2-setup.sh"

      - name: Restart WSL to apply default user
        shell: pwsh
        run: |
          Write-Host "Shutting down WSL to apply /etc/wsl.conf changes (default user=testuser)"
          wsl --shutdown
          Start-Sleep -Seconds 5
          Write-Host "Verifying WSL comes back with correct user"
          $user = (wsl whoami).Trim()
          Write-Host "Current WSL user: $user"
          if ($user -ne "testuser") {
            Write-Error "Expected testuser but got $user"
            exit 1
          }

      - name: Clone repository for testuser
        shell: pwsh
        run: |
          $repoUrl = "${{ env.GITHUB_REPOSITORY_URL }}"
          $branchName = "${{ github.ref_name }}"
          # Full clone with tags so git describe works for version info
          wsl -u testuser -- bash -exc "mkdir -p ~/workspace && cd ~/workspace && git clone --single-branch --branch '$branchName' '$repoUrl' ddev && cd ddev && git fetch --tags && echo 'Checked out:' && git log -1 --oneline && git describe --tags --always"

      - name: Start Docker and verify readiness
        shell: pwsh
        run: |
          wsl -u testuser -- bash -exc @'
            echo "Starting Docker daemon if not running..."
            # Try systemctl first, fall back to manual dockerd
            if command -v systemctl >/dev/null 2>&1 && sudo systemctl is-system-running >/dev/null 2>&1; then
              sudo systemctl start docker || true
            fi
            echo "Waiting for Docker daemon..."
            for i in $(seq 1 60); do
              if docker info >/dev/null 2>&1; then
                echo "Docker is ready after ${i}s"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Docker not ready after 30s, trying manual dockerd start"
                sudo dockerd &>/tmp/dockerd.log &
              fi
              if [ "$i" -eq 60 ]; then
                echo "ERROR: Docker not ready after 60s"
                sudo cat /tmp/dockerd.log 2>/dev/null || true
                exit 1
              fi
              sleep 1
            done
            docker version
          '@

      - name: Run DDEV tests
        shell: pwsh
        env:
          GOTEST_SHORT: ${{ env.GOTEST_SHORT }}
          TESTARGS: ${{ env.TESTARGS }}
          MAKE_TARGET: ${{ env.MAKE_TARGET }}
          DDEV_EMBARGO_TESTS: ${{ env.DDEV_EMBARGO_TESTS }}
          DDEV_SKIP_NODEJS_TEST: ${{ env.DDEV_SKIP_NODEJS_TEST }}
        run: |
          wsl -u testuser -- bash -exc @"
            export GOTEST_SHORT='$env:GOTEST_SHORT'
            export TESTARGS='$env:TESTARGS'
            export MAKE_TARGET='$env:MAKE_TARGET'
            export DDEV_EMBARGO_TESTS='$env:DDEV_EMBARGO_TESTS'
            export DDEV_SKIP_NODEJS_TEST='$env:DDEV_SKIP_NODEJS_TEST'
            cd ~/workspace/ddev
            bash -e .github/workflows/wsl2-test.sh
          "@
