name: Test All Project Types
on:
  pull_request:
    paths:
      - "go.*"
      - "pkg/**"
      - "cmd/**"
      - "Makefile"
      - "vendor/**"
      - ".github/workflows/**"
      - "!.github/workflows/docs**"
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run the build with tmate set "debug_enabled"'
        type: boolean
        required: false
        default: false
      testargs:
        description: 'TESTARGS value'
        type: string
        required: false
        default: ''
      gotest_short:
        description: 'GOTEST_SHORT value (16=drupal11 only)'
        type: string
        required: false
        default: '16'
      make_target:
        description: 'Make target to run (custom job only)'
        type: choice
        required: false
        default: 'test'
        options:
          - test
          - testpkg
          - testcmd
          - testddevapp
          - testnotddevapp
          - testfullsitesetup
          - testonepkg
          - testonefile
      makeargs:
        description: 'Extra make arguments: TESTPKG=./pkg/dockerutil (for testonepkg) or TESTFILE=./pkg/ddevapp/ddevapp_test.go (for testonefile)'
        type: string
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare-testargs:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      testargs: ${{ steps.compute-testargs.outputs.testargs }}
    steps:
      - name: Compute TESTARGS
        id: compute-testargs
        run: |
          # Run all tests that limit their scope when running with any value of GOTEST_SHORT
          TP=(
            "TestAppdirAlreadyInUse"
            "TestAutocomplet"
            "TestAvailableUpdates"
            "TestComposerCreateCmd"
            "TestCmdDescribe"
            "TestCmdList"
            "TestCmdStart"
            "TestCmdStop"
            "TestConfigDatabaseVersion"
            "TestConfigValidate"
            "TestDdevAllDatabases"
            "TestDdevFullSite.*"
            "TestDdevImportFiles.*"
            "TestDdevUploadDir.*"
            "TestDdevXdebugEnabled"
            "TestDdevXhprofPrependEnabled"
            "TestDdevXhprofXhguiEnabled"
            "TestGetApps.*"
            "TestPHPConfig"
            "TestPHPWebserverType"
            "TestWriteDrushConfig"
          )
          TESTARGS="-run '($(IFS="|"; echo "${TP[*]}"))'"
          echo "testargs=${TESTARGS}"
          echo "testargs=${TESTARGS}" >> $GITHUB_OUTPUT

  all-project-types:
    if: github.event_name != 'workflow_dispatch'
    needs: prepare-testargs
    uses: ./.github/workflows/test-reusable.yml
    secrets: inherit
    with:
      gotest_short: "" # run tests for all project types
      testargs: ${{ needs.prepare-testargs.outputs.testargs }}
      debug_enabled: ${{ inputs.debug_enabled || false }}

  all-project-types-custom:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/test-reusable.yml
    secrets: inherit
    with:
      make_target: ${{ inputs.make_target }}
      makeargs: ${{ inputs.makeargs }}
      testargs: ${{ inputs.testargs }}
      gotest_short: ${{ inputs.gotest_short }}
      debug_enabled: ${{ inputs.debug_enabled || false }}
