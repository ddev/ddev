name: Test Pull/Push Providers
on:
  pull_request:
    paths:
      - "go.*"
      - "pkg/**"
      - "cmd/**"
      - "Makefile"
      - "vendor/**"
      - ".github/workflows/**"
      - "!.github/workflows/docs**"
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run the build with tmate set "debug_enabled"'
        type: boolean
        required: false
        default: false
      testargs:
        description: 'TESTARGS value'
        type: string
        required: false
        default: ''
      gotest_short:
        description: 'GOTEST_SHORT value (16=drupal11 only)'
        type: string
        required: false
        default: '16'
      make_target:
        description: 'Make target to run (custom job only)'
        type: choice
        required: false
        default: 'test'
        options:
          - test
          - testpkg
          - testcmd
          - testddevapp
          - testnotddevapp
          - testfullsitesetup
          - testonepkg
          - testonefile
      makeargs:
        description: 'Extra make arguments: TESTPKG=./pkg/dockerutil (for testonepkg) or TESTFILE=./pkg/ddevapp/ddevapp_test.go (for testonefile)'
        type: string
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pull-push-providers:
    if: github.event_name != 'workflow_dispatch' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == github.repository_owner)
    uses: ./.github/workflows/test-reusable.yml
    secrets: inherit
    with:
      pull_push_providers: "true"
      testargs: "-run 'Test.*(Push|Pull)'"
      debug_enabled: ${{ inputs.debug_enabled || false }}

  pull-push-providers-custom:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/test-reusable.yml
    secrets: inherit
    with:
      make_target: ${{ inputs.make_target }}
      makeargs: ${{ inputs.makeargs }}
      testargs: ${{ inputs.testargs }}
      gotest_short: ${{ inputs.gotest_short }}
      pull_push_providers: "true"
      debug_enabled: ${{ inputs.debug_enabled || false }}
